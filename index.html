<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табличка — Африканский страус — Парк Сказка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #f5e6f0 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  .sign-card {
    width: 420px;
    height: 600px;
    background: linear-gradient(180deg, #2196F3 0%, #1565C0 100%);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 20px 60px rgba(21, 101, 192, 0.3),
      0 4px 12px rgba(0,0,0,0.1),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }

  /* Decorative circles */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .deco-circle:nth-child(1) { width: 150px; height: 150px; top: -40px; right: -40px; }
  .deco-circle:nth-child(2) { width: 60px; height: 60px; top: 20px; right: 10px; }
  .deco-circle:nth-child(3) { width: 100px; height: 100px; bottom: 60px; left: -30px; }

  /* Wave decoration */
  .sign-wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 180px;
    opacity: 0.1;
  }
  .sign-wave svg { width: 100%; height: 100%; }

  .sign-header {
    padding: 20px 24px 8px;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .sign-logo {
    font-family: 'Comfortaa', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .sign-zone-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 16px;
    font-family: 'Comfortaa', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #FFD54F;
    margin-top: 4px;
  }

  .sign-photo-area {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    margin: 12px 0 0;
  }

  .sign-photo-frame {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFD54F, #F06292);
    padding: 5px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    position: relative;
  }

  .sign-photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.1);
    font-size: 100px;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 12px;
    height: 12px;
    animation: sparkleAnim 2s ease-in-out infinite;
  }
  .sparkle::before, .sparkle::after {
    content: '';
    position: absolute;
    background: #FFD54F;
  }
  .sparkle::before {
    width: 2px; height: 12px;
    left: 5px; top: 0;
    border-radius: 2px;
  }
  .sparkle::after {
    width: 12px; height: 2px;
    top: 5px; left: 0;
    border-radius: 2px;
  }
  .sparkle:nth-child(1) { top: -5px; right: 15px; animation-delay: 0s; }
  .sparkle:nth-child(2) { bottom: 20px; left: 5px; animation-delay: 0.5s; }
  .sparkle:nth-child(3) { top: 40px; left: -8px; animation-delay: 1s; }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0.3; transform: scale(0.6) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(45deg); }
  }

  .sign-name {
    text-align: center;
    padding: 16px 24px 4px;
    position: relative;
    z-index: 2;
  }
  .sign-name h2 {
    font-family: 'Comfortaa', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #FFFFFF;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .sign-name-latin {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-style: italic;
    margin-top: 2px;
  }

  .sign-cta {
    text-align: center;
    padding: 12px 24px;
    position: relative;
    z-index: 2;
  }
  .sign-cta-bubble {
    display: inline-block;
    background: #FFFFFF;
    border-radius: 20px;
    padding: 10px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    position: relative;
  }
  .sign-cta-bubble::after {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid #FFFFFF;
  }
  .sign-cta-text {
    font-family: 'Comfortaa', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #1565C0;
  }

  .sign-qr {
    text-align: center;
    padding: 12px 24px 0;
    position: relative;
    z-index: 2;
  }
  .qr-box {
    display: inline-block;
    background: #FFFFFF;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .qr-box canvas, .qr-box img {
    border-radius: 8px;
    display: block;
  }

  .sign-footer {
    text-align: center;
    padding: 8px;
    position: relative;
    z-index: 2;
  }
  .sign-footer span {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }

  @media print {
    body {
      background: white;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .sign-card {
      box-shadow: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  @media (max-width: 460px) {
    .sign-card { width: 340px; height: 500px; }
    .sign-photo-frame { width: 180px; height: 180px; }
    .sign-photo-inner { font-size: 80px; }
    .sign-name h2 { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="sign-card">
  <!-- Decorative circles -->
  <div class="deco-circle"></div>
  <div class="deco-circle"></div>
  <div class="deco-circle"></div>

  <!-- Wave -->
  <div class="sign-wave">
    <svg viewBox="0 0 420 180" fill="none">
      <path d="M0 60C70 20 140 100 210 60C280 20 350 100 420 60V180H0V60Z" fill="white"/>
    </svg>
  </div>

  <div class="sign-header">
    <div class="sign-logo">ПАРК СКАЗКА</div>
    <div class="sign-zone-badge">🦜 Зона Птиц</div>
  </div>

  <div class="sign-photo-area">
    <div class="sign-photo-frame">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sign-photo-inner">🦤</div>
    </div>
  </div>

  <div class="sign-name">
    <h2>Африканский страус</h2>
    <div class="sign-name-latin">Struthio camelus</div>
  </div>

  <div class="sign-cta">
    <div class="sign-cta-bubble">
      <div class="sign-cta-text">
        <span>📲</span> Отсканируй и познакомься со мной!
      </div>
    </div>
  </div>

  <div class="sign-qr">
    <div class="qr-box">
      <div id="qrcode"></div>
    </div>
  </div>

  <div class="sign-footer">
    <span>parkskazka.com</span>
  </div>
</div>

<script>
(function() {
  var qrUrl = 'https://aihrtest-create.github.io/park-birds/ostrich.html';
  new QRCode(document.getElementById('qrcode'), {
    text: qrUrl,
    width: 100,
    height: 100,
    colorDark: '#1565C0',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
})();
</script>

</body>
</html>
